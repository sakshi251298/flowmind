apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: web
  namespace: flowmind
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: flowmind.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web
                port:
                  name: http

apiVersion: v1
kind: Secret
metadata:
  name: user-service-env
  namespace: flowmind
type: Opaque
stringData:
  POSTGRES_URI: "postgresql://flowmind:flowmind@postgres:5432"
  POSTGRES_DATABASE: "flowmind"
  MIGRATE_DATABASE_URL: "postgres://flowmind:flowmind@postgres:5432/flowmind?sslmode=disable"
---
apiVersion: v1
kind: Secret
metadata:
  name: agent-service-env
  namespace: flowmind
type: Opaque
stringData:
  DATABASE_URL: "postgresql://flowmind:flowmind@postgres:5432/flowmind"
  # ──────────────────────────────────────────────────────
  # Fill in at least one real API key below.
  # You can also use envsubst to inject from environment:
  #   envsubst < deployment/local/secrets.yaml | kubectl apply -f -
  # ──────────────────────────────────────────────────────
